<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>VisionFX Editor</title>

<link rel="stylesheet"
href="css/editor.css">

</head>

<body>

<div class="editor">

<div class="left">

<label class="upload">

<input
id="upload"
type="file"
accept="image/*,video/*"
hidden>

Click to Upload

</label>

<div id="preview">

Waiting for upload...

</div>

</div>

<div class="right">

<h2>

Effects

</h2>

<div id="effects">

<h2>Adjustments</h2>

<div class="control">
<label>Exposure</label>
<input id="exposure" type="range" min="-100" max="100" value="0">
<span id="exposureValue">0</span>
</div>

<div class="control">
<label>Brightness</label>
<input id="brightness" type="range" min="-100" max="100" value="0">
<span id="brightnessValue">0</span>
</div>

<div class="control">
<label>Contrast</label>
<input id="contrast" type="range" min="-100" max="100" value="0">
<span id="contrastValue">0</span>
</div>

<div class="control">
<label>Saturation</label>
<input id="saturation" type="range" min="-100" max="100" value="0">
<span id="saturationValue">0</span>
</div>

<div class="control">
<label>Grain</label>
<input id="grain" type="range" min="0" max="100" value="0">
<span id="grainValue">0</span>
</div>

</div>

</div>

</div>

<script type="module"
src="js/editor.js"></script>

</body>

</html>
