<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisionFX</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<nav>

<div class="logo">
VisionFX
</div>

<div class="nav-right">

<button class="login">
Login
</button>

<button class="pro">
Go Pro
</button>

</div>

</nav>


<section class="hero">

<h1>

Professional AI Film Looks

</h1>

<p>

Upload any image or video.
Preview premium cinematic filters instantly.

</p>

</section>



<section class="upload-section">

<label class="upload-box" for="upload">

<div class="upload-icon">

⬆

</div>

<h2>

Drop Image or Video

</h2>

<p>

PNG • JPG • WEBP • MP4 • MOV

</p>

<input
id="upload"
type="file"
accept="image/*,video/*"
hidden>

</label>

</section>



<section class="preview">

<div id="previewContainer">
<canvas id="editorCanvas" style="display:none;"></canvas>

<div class="placeholder">

Nothing uploaded yet

</div>

</div>

</section>



<section class="effects">

<h2>

Effects

</h2>

<div class="effect-grid">

<button>High Contrast</button>

<button>Noir</button>

<button>Fuji</button>

<button>Kodak</button>

<button>Film Grain</button>

<button>Bloom</button>

<button>Glow</button>

<button>Touch Designer</button>

<button>HUD Scan</button>

<button>VHS</button>

</div>

</section>



<footer>

Free Export : 480p

<span>

|

</span>

Pro : 720p • 1080p • 2K

</footer>

<script type="module" src="js/app.js"></script>
  
</body>
</html>
